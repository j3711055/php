<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>لوحة التحكم | واحد العراق</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body>

  <div class="admin-bg" aria-hidden="true"></div>
  <div class="admin-grid" aria-hidden="true"></div>

  <!-- ═════════════════ LOGIN SCREEN ═════════════════════════ -->
  <div id="login-screen">
    <div class="login-card">
      <img
        src="https://cdn.jsdelivr.net/gh/a9ii/MTProxy-Installer-Manager/images/oneIQ.webp"
        alt="شعار واحد العراق"
        class="login-logo"
      />
      <h1 class="login-title">لوحة التحكم</h1>
      <p class="login-sub">واحد العراق &mdash; قناة الأخبار الأولى</p>
      <input
        type="password"
        id="login-pass"
        class="login-input"
        placeholder="كلمة المرور"
        autocomplete="current-password"
        aria-label="كلمة المرور"
      />
      <button class="login-btn" id="login-btn">دخول</button>
      <p class="login-error" id="login-error" role="alert"></p>
    </div>
  </div>

  <!-- ═════════════════ ADMIN DASHBOARD ══════════════════════ -->
  <div id="admin-wrap" class="admin-wrap hidden">

    <!-- Admin Header -->
    <header class="admin-header">
      <div class="admin-header-left">
        <img
          src="https://cdn.jsdelivr.net/gh/a9ii/MTProxy-Installer-Manager/images/oneIQ.webp"
          alt="شعار واحد العراق"
          class="admin-logo"
        />
        <div>
          <div class="admin-title">واحد العراق</div>
          <div class="admin-sub">قناة الاخبار الاولى</div>
        </div>
        <span class="admin-badge">لوحة التحكم</span>
      </div>
      <div style="display:flex;align-items:center;gap:0.8rem;">
        <a href="/" class="btn-secondary" style="text-decoration:none;padding:0.4rem 1rem;font-size:0.8rem;">
          ← الصفحة الرئيسية
        </a>
        <button class="btn-logout" id="logout-btn">تسجيل الخروج</button>
      </div>
    </header>

    <!-- Main Grid -->
    <main class="admin-main">

      <!-- ── ADD / EDIT FORM ──────────────────────────── -->
      <aside>
        <div class="glass-card">
          <h2 class="card-title">
            <span class="card-title-icon">⚽</span>
            <span id="form-title">إضافة مباراة جديدة</span>
          </h2>

          <form id="match-form" novalidate>
            <input type="hidden" id="edit-id" />

            <div class="form-group">
              <label class="form-label" for="f-name">اسم المباراة *</label>
              <input
                type="text" id="f-name"
                class="form-input"
                placeholder="مثال: نهائي كأس العالم"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label">طريقة التشغيل</label>
              <div style="display:flex;gap:1.5rem;margin-top:0.4rem;padding:0.75rem 1rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-lg);">
                <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;">
                  <input type="radio" name="f-player-type" value="default" checked style="accent-color:var(--red);" />
                  <span style="font-size:0.85rem;">الطريقة الحالية (Default)</span>
                </label>
                <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;">
                  <input type="radio" name="f-player-type" value="m3u8" style="accent-color:var(--red);" />
                  <span style="font-size:0.85rem;">مشغل M3U8 الجديد</span>
                </label>
              </div>
            </div>

            <div id="classic-settings">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="f-team-a">الفريق الأول</label>
                  <input type="text" id="f-team-a" class="form-input" placeholder="البرازيل" />
                </div>
                <div class="form-group">
                  <label class="form-label" for="f-team-b">الفريق الثاني</label>
                  <input type="text" id="f-team-b" class="form-input" placeholder="الأرجنتين" />
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="f-time">وقت المباراة</label>
                <input
                  type="text" id="f-time"
                  class="form-input"
                  placeholder="21:00 بتوقيت بغداد"
                />
              </div>

              <div class="form-group">
                <label class="form-label" for="f-link">رابط البث المباشر *</label>
                <input
                  type="url" id="f-link"
                  class="form-input"
                  placeholder="https://stream.example.com/live"
                  dir="ltr"
                  required
                />
              </div>
            </div>

            <div id="m3u8-settings" class="hidden">
              <div class="form-group">
                <label class="form-label" for="f-group-name">اسم المجموعة</label>
                <input type="text" id="f-group-name" class="form-input" placeholder="مثال: BeIN Sports" />
              </div>

              <div class="form-group">
                <label class="form-label" for="f-logo-url">رابط صورة الشعار</label>
                <input type="url" id="f-logo-url" class="form-input" placeholder="https://example.com/logo.png" dir="ltr" />
                <div id="logo-preview-wrap" style="margin-top:0.5rem;display:none;">
                  <img id="logo-preview" src="" alt="شعار القناة" style="max-height:50px;border-radius:6px;border:1px solid var(--glass-bdr);padding:2px;background:rgba(0,0,0,0.5);" />
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">الجودات المتاحة</label>
                <div id="qualities-list" style="display:flex;flex-direction:column;gap:0.6rem;margin-bottom:0.6rem;">
                  <!-- Dynamic Quality Rows -->
                </div>
                <button type="button" class="btn-secondary" id="btn-add-quality" style="width:100%;padding:0.6rem;font-size:0.8rem;border-style:dashed;border-color:rgba(255,255,255,0.2);">
                  ➕ إضافة جودة
                </button>
              </div>
            </div>

            <div class="form-group">
              <div class="live-toggle-wrap">
                <label class="live-toggle-label" for="f-live">بث مباشر الآن</label>
                <label class="toggle-switch">
                  <input type="checkbox" id="f-live" />
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn-primary" id="submit-btn">إضافة المباراة</button>
              <button type="button" class="btn-secondary hidden" id="cancel-btn">إلغاء</button>
            </div>
          </form>
        </div>
      </aside>

      <!-- ── MATCHES LIST ─────────────────────────────── -->
      <section>
        <div class="glass-card">
          <h2 class="card-title">
            <span class="card-title-icon">📋</span>
            قائمة المباريات
          </h2>

          <div class="stats-bar">
            <span class="stat-chip">الإجمالي: <b id="stat-total">0</b></span>
            <span class="stat-chip">مباشر الآن: <b id="stat-live">0</b></span>
          </div>

          <div id="match-list" class="matches-list">
            <div class="empty-list">جارٍ التحميل…</div>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- Toast notification -->
  <div id="toast" role="status" aria-live="polite"></div>

  <script src="assets/js/admin.js"></script>
</body>
</html>

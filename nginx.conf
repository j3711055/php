# ══════════════════════════════════════════════════════════════
#  OneIQ — Nginx Site Config
#  Managed by: deploy.sh  (auto-sets PHP socket & rate-limit zones)
#  Installed to: /etc/nginx/sites-available/oneiq
# ══════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name iq.e9i.me;

    # ── Document Root ─────────────────────────────────────────
    root /var/www/oneiq;
    index index.html;
    charset utf-8;

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/oneiq_access.log combined buffer=16k flush=5m;
    error_log  /var/log/nginx/oneiq_error.log  warn;

    # ── Security: Block SQLite downloads ──────────────────────
    location ~* \.sqlite$ {
        deny all;
        return 403;
    }

    # ── Security: Block internal PHP files ────────────────────
    location ~* ^/(config|db|init_db)\.php$ {
        deny all;
        return 403;
    }

    # ── Security: Block hidden files & database dir ───────────
    location ~ /\. {
        deny all;
        return 404;
    }
    location ^~ /database/ {
        deny all;
        return 403;
    }

    # ── Clean URL: /goal → goal.html ──────────────────────────
    location = /goal {
        try_files /goal.html =404;
    }

    # ── Stream redirect gateway (Referer-stripping) ───────────
    location = /go {
        limit_req zone=page_limit burst=60 nodelay;
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php-fpm.sock;
        fastcgi_param  SCRIPT_FILENAME $document_root/go.php;
        fastcgi_param  QUERY_STRING    $query_string;
        fastcgi_read_timeout 10s;
        # Belt-and-suspenders: also strip Referer at Nginx level
        add_header Referrer-Policy "no-referrer" always;
        add_header Cache-Control   "no-store"    always;
    }

    # ── Auth endpoint ─────────────────────────────────────────
    location = /auth.php {
        limit_req zone=api_limit burst=5 nodelay;
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php-fpm.sock;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 10s;
        add_header Cache-Control "no-store" always;
    }

    # ── API endpoint ──────────────────────────────────────────
    location = /api.php {
        limit_req zone=api_limit burst=20 nodelay;
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php-fpm.sock;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout 30s;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # ── Block all other PHP files ──────────────────────────────
    location ~ \.php$ {
        return 403;
    }

    # ── Static Assets ─────────────────────────────────────────
    location ~* \.(css|js|woff2?|ttf|eot|svg|ico|webp|png|jpg|jpeg|gif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
        add_header Vary "Accept-Encoding";
        access_log off;
        sendfile   on;
        tcp_nopush on;
    }

    # ── HTML pages (no cache) ─────────────────────────────────
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Content-Type-Options  "nosniff";
        add_header X-Frame-Options         "SAMEORIGIN";
        add_header X-XSS-Protection        "1; mode=block";
        add_header Referrer-Policy         "strict-origin-when-cross-origin";
    }

    # ── Root ──────────────────────────────────────────────────
    location / {
        limit_req zone=page_limit burst=40 nodelay;
        try_files $uri $uri/ =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "SAMEORIGIN" always;
    }

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/xml text/xml image/svg+xml;

    # ── Timeouts & limits ─────────────────────────────────────
    keepalive_timeout  65;
    client_max_body_size 2m;
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;
}

# ── HTTPS (enable after: certbot --nginx -d iq.e9i.me) ───────
# certbot will automatically add the SSL server block here.

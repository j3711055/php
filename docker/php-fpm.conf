; ══════════════════════════════════════════════════════════════
;  OneIQ — PHP-FPM Pool Configuration
;  Replaces the default www.conf that ships with php:8.3-fpm-alpine
;  Listens on TCP 9000 (not a Unix socket) for Docker portability.
; ══════════════════════════════════════════════════════════════

[global]
; Log to stderr so Docker captures it
error_log = /dev/stderr
log_level = warning

[www]
; ── User / Group ──────────────────────────────────────────────
user  = www-data
group = www-data

; ── Listen: TCP port 9000 (Nginx proxies here) ────────────────
listen = 127.0.0.1:9000
listen.allowed_clients = 127.0.0.1

; ── Process Management ────────────────────────────────────────
pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests      = 500

; ── Logging ───────────────────────────────────────────────────
access.log  = /dev/stdout
slowlog     = /dev/stderr
request_slowlog_timeout = 10s

; ── Security: clear env then pass only what's needed ──────────
clear_env = no

; ── Status page (optional, for monitoring) ────────────────────
pm.status_path = /fpm-status

; ── Error handling ────────────────────────────────────────────
catch_workers_output = yes
decorate_workers_output = no

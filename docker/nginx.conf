# ══════════════════════════════════════════════════════════════
#  OneIQ — Nginx Configuration Template
#
#  This file is a TEMPLATE. The entrypoint.sh uses envsubst to
#  replace ${PORT} with the actual Railway PORT value at startup.
#
#  Key differences from the old nginx.conf:
#    - listen ${PORT}        (dynamic, set by Railway)
#    - server_name _         (accept any hostname)
#    - fastcgi_pass 127.0.0.1:9000  (TCP, not Unix socket)
#    - Rate limiting removed (handled at Railway/infra level)
# ══════════════════════════════════════════════════════════════

user  www-data;
worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging (stdout for Railway log collection) ────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /dev/stdout main;

    # ── Performance ───────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 2m;
    server_tokens off;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/xml text/xml image/svg+xml;

    server {
        # Dynamic port from Railway — injected by entrypoint.sh
        listen ${PORT};
        listen [::]:${PORT};

        # Accept any hostname (Railway assigns a generated domain)
        server_name _;

        root    /var/www/html;
        index   index.html;
        charset utf-8;

        # ── Security Headers ───────────────────────────────────
        add_header X-Content-Type-Options  "nosniff"                        always;
        add_header X-Frame-Options         "SAMEORIGIN"                     always;
        add_header X-XSS-Protection        "1; mode=block"                  always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # ── Block SQLite files ─────────────────────────────────
        location ~* \.sqlite3?$ {
            deny all;
            return 403;
        }

        # ── Block internal PHP files (config, db, init) ────────
        location ~* ^/(config|db|init_db)\.php$ {
            deny all;
            return 403;
        }

        # ── Block hidden files & data directory ───────────────
        location ~ /\. {
            deny all;
            return 404;
        }
        location ^~ /database/ {
            deny all;
            return 403;
        }
        location ^~ /docker/ {
            deny all;
            return 403;
        }

        # ── Health check (Railway probe) ──────────────────────
        location = /health.php {
            include        fastcgi_params;
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_read_timeout 5s;
            access_log off;
        }

        # ── Clean URL: /goal → goal.html ──────────────────────
        location = /goal {
            try_files /goal.html =404;
        }

        # ── Stream redirect gateway (Referer-stripping) ───────
        location = /go {
            include        fastcgi_params;
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_param  SCRIPT_FILENAME $document_root/go.php;
            fastcgi_param  QUERY_STRING    $query_string;
            fastcgi_read_timeout 10s;
            add_header Referrer-Policy "no-referrer" always;
            add_header Cache-Control   "no-store"    always;
        }

        # ── Auth endpoint ─────────────────────────────────────
        location = /auth.php {
            include        fastcgi_params;
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_read_timeout 10s;
            add_header Cache-Control "no-store" always;
        }

        # ── API endpoint ──────────────────────────────────────
        location = /api.php {
            include        fastcgi_params;
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param  PATH_INFO       $fastcgi_path_info;
            fastcgi_read_timeout 30s;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        # ── Block all other .php files ─────────────────────────
        location ~ \.php$ {
            return 403;
        }

        # ── Static Assets ─────────────────────────────────────
        location ~* \.(css|js|woff2?|ttf|eot|svg|ico|webp|png|jpg|jpeg|gif)$ {
            expires 30d;
            add_header Cache-Control "public, immutable, max-age=2592000";
            add_header Vary "Accept-Encoding";
            access_log off;
        }

        # ── HTML pages (no-cache) ─────────────────────────────
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # ── Default: static files, 404 if not found ───────────
        location / {
            try_files $uri $uri/ =404;
        }
    }
}

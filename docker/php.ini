; ══════════════════════════════════════════════════════════════
;  OneIQ — PHP Runtime Configuration
;  Production-hardened settings for Railway/Docker deployment.
; ══════════════════════════════════════════════════════════════

; ── Error Handling ────────────────────────────────────────────
; In production, hide errors from the browser (log them instead)
display_errors         = Off
display_startup_errors = Off
log_errors             = On
error_log              = /dev/stderr
error_reporting        = E_ALL & ~E_DEPRECATED & ~E_STRICT

; ── Performance ───────────────────────────────────────────────
memory_limit        = 128M
max_execution_time  = 30
max_input_time      = 30
realpath_cache_size = 4096k
realpath_cache_ttl  = 600

; ── Upload limits (small — no file uploads in this app) ───────
upload_max_filesize = 2M
post_max_size       = 4M
max_file_uploads    = 5

; ── OPcache ───────────────────────────────────────────────────
opcache.enable              = 1
opcache.enable_cli          = 0
opcache.memory_consumption  = 64
opcache.max_accelerated_files = 4000
opcache.revalidate_freq     = 60
opcache.validate_timestamps = 1
opcache.fast_shutdown       = 1

; ── Security ──────────────────────────────────────────────────
expose_php           = Off
allow_url_fopen      = Off
allow_url_include    = Off
session.cookie_httponly = 1
session.cookie_secure   = 1
session.cookie_samesite = Strict
session.use_strict_mode = 1

; ── Timezone ──────────────────────────────────────────────────
date.timezone = Asia/Baghdad
